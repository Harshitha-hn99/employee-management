name: Python CI

on:
  push:
    branches:
      - main

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r app/requirements.txt

      - name: Run Pytest
        run: |
          python -m pytest -v

      - name: Create Docker image
        run: |
           docker build -t employee-management .    
