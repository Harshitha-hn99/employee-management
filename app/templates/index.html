<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h2 class="text-center">Employee Management System by HN</h2>
        </div>

        <div class="card-body">

            <!-- Employee Form -->
            <form id="employeeForm">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Name</label>
                        <input
                            type="text"
                            id="name"
                            class="form-control"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input
                            type="email"
                            id="email"
                            class="form-control"
                            required>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Department</label>
                        <input
                            type="text"
                            id="department"
                            class="form-control"
                            required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Salary</label>
                        <input
                            type="number"
                            id="salary"
                            class="form-control"
                            required>
                    </div>

                </div>

                <button class="btn btn-success w-100">
                    Add Employee
                </button>

            </form>

            <hr>

            <h4>Employees</h4>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Department</th>
                    <th>Salary</th>
                    <th>Actions</th>
                </tr>

                </thead>

                <tbody id="employeeTable">

                    <!-- JavaScript will insert rows here -->

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Our JavaScript -->
<script src="/static/app.js"></script>

</body>
</html>
